<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CelularTech</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <section class="cta">
        <nav class="container">
            <h1 class="logo" style="text-align: center; font-size: 2.5rem;">CelularTech</h1>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="tecnicos.html">Técnicos</a>
                <a href="login.html" class="btn-primary">Entrar</a>
            </div>
        </nav>
    </section>

    <div class="form-container" style="max-width: 600px;">
        <h2>Cadastrar</h2>
        <div id="alert"></div>
        <form onsubmit="cadastrar(event)">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required minlength="6">
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label>Cidade</label>
                <input type="text" id="cidade" required>
            </div>
            <div class="form-group">
                <label>Tipo de Usuário</label>
                <select id="tipo" onchange="mostrarCamposTecnico()">
                    <option value="cliente">Cliente</option>
                    <option value="tecnico">Técnico</option>
                </select>
            </div>
            <div id="camposTecnico" style="display: none;">
                <div class="form-group">
                    <label>Descrição (opcional)</label>
                    <textarea id="descricao" rows="3"></textarea>
                </div>
            </div>
            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            Já tem conta? <a href="login.html" style="color: #3B82F6;">Entrar</a>
        </p>
    </div>

    <script src="../js/app.js"></script>
    <script>
        function mostrarCamposTecnico() {
            const tipo = document.getElementById('tipo').value;
            document.getElementById('camposTecnico').style.display = 
                tipo === 'tecnico' ? 'block' : 'none';
        }

        function cadastrar(e) {
            e.preventDefault();
            
            const usuario = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value,
                telefone: document.getElementById('telefone').value,
                cidade: document.getElementById('cidade').value,
                tipo: document.getElementById('tipo').value,
                descricao: document.getElementById('descricao').value
            };
            
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            
            if (usuarios.find(u => u.email === usuario.email)) {
                document.getElementById('alert').innerHTML = 
                    '<div class="alert alert-error">Email já cadastrado</div>';
                return;
            }
            
            usuarios.push(usuario);
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            localStorage.setItem('usuario', JSON.stringify(usuario));
            
            window.location.href = `dashboard-${usuario.tipo}.html`;
        }
    </script>
</body>
</html>
