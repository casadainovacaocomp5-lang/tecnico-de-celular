<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CelularTech</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            min-height: 100vh;
        }

        header {
            background: transparent;
            box-shadow: none;
            border-bottom: none;
            padding: 1.5rem 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: white;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
        }

        .register-wrapper {
            width: 100%;
            max-width: 600px;
        }

        .register-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .register-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .register-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .register-header p {
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .register-content {
            padding: 2.5rem 2rem;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            padding: 0.9rem 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #1F2937;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .strength-bar {
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.3rem;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            display: none;
        }

        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            padding: 1.5rem;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
            color: #6B7280;
        }

        .role-label:hover {
            border-color: #10B981;
            background: #F0FDF4;
        }

        .role-option input:checked + .role-label {
            border-color: #10B981;
            background: #D1FAE5;
            color: #047857;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .role-icon {
            font-size: 2rem;
        }

        .terms-box {
            background: #F0FDF4;
            border: 2px solid #D1FAE5;
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .terms-box label {
            display: flex;
            gap: 0.8rem;
            cursor: pointer;
            align-items: flex-start;
            font-size: 0.9rem;
            color: #047857;
        }

        .terms-box input {
            margin-top: 0.3rem;
            cursor: pointer;
            accent-color: #10B981;
        }

        .terms-box a {
            color: #10B981;
            font-weight: 600;
            text-decoration: none;
        }

        .terms-box a:hover {
            text-decoration: underline;
        }

        .btn-register {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .divider {
            text-align: center;
            color: #6B7280;
            margin: 1.5rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid #E5E7EB;
            border-bottom: 1px solid #E5E7EB;
            font-size: 0.9rem;
        }

        .login-link {
            background: #F3F4F6;
            color: #1F2937;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
        }

        .login-link:hover {
            background: #E5E7EB;
        }

        @media (max-width: 768px) {
            .register-header {
                padding: 2rem 1.5rem;
            }

            .register-content {
                padding: 1.5rem;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            nav {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                gap: 1rem;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">CelularTech</a>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="login.html">Entrar</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="register-wrapper">
            <div class="register-card">
                <div class="register-header">
                    <h1>Criar Conta 🚀</h1>
                    <p>Junte-se à comunidade CelularTech</p>
                </div>

                <div class="register-content">
                    <form id="registerForm" class="form">
                        <div class="form-group">
                            <label for="name">Nome Completo</label>
                            <input type="text" id="name" name="name" required placeholder="Seu nome completo">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="seu@email.com">
                        </div>

                        <div class="form-group">
                            <label for="password">Senha</label>
                            <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" onkeyup="checkPasswordStrength()">
                            <div class="password-strength">
                                <div class="strength-bar">
                                    <div class="strength-fill" id="strengthFill"></div>
                                </div>
                                <span id="strengthText" style="color: #6B7280; font-size: 0.8rem;"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="passwordConfirm">Confirmar Senha</label>
                            <input type="password" id="passwordConfirm" name="passwordConfirm" required placeholder="Confirme sua senha">
                        </div>

                        <div class="form-group">
                            <label>Tipo de Conta</label>
                            <div class="role-selector">
                                <div class="role-option">
                                    <input type="radio" id="role-client" name="role" value="client" required>
                                    <label for="role-client" class="role-label">
                                        <span class="role-icon">👤</span>
                                        <span>Cliente</span>
                                        <span style="font-size: 0.75rem; font-weight: 400;">Procurando técnicos</span>
                                    </label>
                                </div>
                                <div class="role-option">
                                    <input type="radio" id="role-technician" name="role" value="technician" required>
                                    <label for="role-technician" class="role-label">
                                        <span class="role-icon">🔧</span>
                                        <span>Técnico</span>
                                        <span style="font-size: 0.75rem; font-weight: 400;">Oferecendo serviços</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="terms-box">
                            <label>
                                <input type="checkbox" id="agree" required>
                                <span>Concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn-register">Criar Conta</button>
                    </form>

                    <div class="divider">Já tem conta?</div>

                    <a href="login.html" class="login-link">Entrar na sua conta</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/data-manager.js"></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/app.js"></script>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            
            let strength = 0;
            let message = '';
            let color = '';

            if (password.length >= 6) strength += 25;
            if (password.length >= 10) strength += 25;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/\d/.test(password)) strength += 25;

            if (strength === 0) {
                message = '';
                color = '#E5E7EB';
            } else if (strength <= 25) {
                message = 'Fraca';
                color = '#EF4444';
            } else if (strength <= 50) {
                message = 'Média';
                color = '#F59E0B';
            } else if (strength <= 75) {
                message = 'Boa';
                color = '#10B981';
            } else {
                message = 'Forte';
                color = '#10B981';
            }

            fill.style.width = strength + '%';
            fill.style.backgroundColor = color;
            text.textContent = message;
            text.style.color = color;
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const role = document.querySelector('input[name="role"]:checked')?.value;

            // Validações
            if (password !== passwordConfirm) {
                Notifications.error('As senhas não coincidem!');
                return;
            }

            if (password.length < 6) {
                Notifications.error('Senha deve ter pelo menos 6 caracteres!');
                return;
            }

            if (!role) {
                Notifications.error('Selecione o tipo de conta!');
                return;
            }

            // Registrar usuário
            const result = auth.register({
                name,
                email,
                password,
                role
            });

            if (result.success) {
                Notifications.success('Conta criada com sucesso!');
                setTimeout(() => {
                    Router.redirect(`dashboard-${result.user.role}.html`);
                }, 1500);
            } else {
                Notifications.error(result.message);
            }
        });
    </script>
</body>
</html>
