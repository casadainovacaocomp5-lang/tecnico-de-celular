<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CelularTech</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="../index.html" class="logo">🔧 CelularTech</a>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="login.html">Entrar</a>
            </div>
        </nav>
    </header>

    <main style="min-height: calc(100vh - 80px); display: flex; align-items: center; padding: 2rem 0;">
        <div class="container">
            <div style="max-width: 500px; margin: 0 auto;">
                <div style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);">
                    <h1 style="text-align: center; margin-bottom: 1rem; color: #3B82F6;">Criar Conta</h1>
                    <p style="text-align: center; color: #6B7280; margin-bottom: 2rem;">Junte-se à comunidade CelularTech</p>

                    <form id="registerForm" class="form">
                        <div class="form-group">
                            <label for="name">Nome Completo</label>
                            <input type="text" id="name" name="name" required placeholder="Seu nome">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="seu@email.com">
                        </div>

                        <div class="form-group">
                            <label for="password">Senha</label>
                            <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                        </div>

                        <div class="form-group">
                            <label for="passwordConfirm">Confirmar Senha</label>
                            <input type="password" id="passwordConfirm" name="passwordConfirm" required placeholder="Confirme sua senha">
                        </div>

                        <div class="form-group">
                            <label for="role">Tipo de Conta</label>
                            <select id="role" name="role" required>
                                <option value="">Selecione...</option>
                                <option value="client">Cliente (procurando técnicos)</option>
                                <option value="technician">Técnico (oferecendo serviços)</option>
                            </select>
                        </div>

                        <div style="background: #ECF0FF; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                            <label style="display: flex; gap: 0.5rem; align-items: flex-start; cursor: pointer;">
                                <input type="checkbox" id="agree" required style="margin-top: 0.3rem;">
                                <span>Concordo com os <a href="#" style="color: #3B82F6;">Termos de Serviço</a> e <a href="#" style="color: #3B82F6;">Política de Privacidade</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem;">Criar Conta</button>
                    </form>

                    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB;">
                        <p style="color: #6B7280;">Já tem conta?</p>
                        <a href="login.html" class="btn-secondary" style="width: 100%; text-align: center; display: block;">Entrar</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/data-manager.js"></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/app.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const role = document.getElementById('role').value;

            // Validações
            if (password !== passwordConfirm) {
                Notifications.error('As senhas não coincidem!');
                return;
            }

            if (password.length < 6) {
                Notifications.error('Senha deve ter pelo menos 6 caracteres!');
                return;
            }

            if (!role) {
                Notifications.error('Selecione o tipo de conta!');
                return;
            }

            // Registrar usuário
            const result = auth.register({
                name,
                email,
                password,
                role
            });

            if (result.success) {
                Notifications.success('Conta criada com sucesso!');
                setTimeout(() => {
                    Router.redirect(`dashboard-${result.user.role}.html`);
                }, 1500);
            } else {
                Notifications.error(result.message);
            }
        });
    </script>
</body>
</html>
