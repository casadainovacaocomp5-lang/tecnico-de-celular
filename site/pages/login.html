<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CelularTech</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <section class="cta">
        <nav class="container">
            <h1 class="logo" style="text-align: center; font-size: 2.5rem;">CelularTech</h1>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="tecnicos.html">Técnicos</a>
                <a href="cadastro.html" class="btn-primary">Cadastrar</a>
            </div>
        </nav>
    </section>

    <div class="form-container">
        <h2>Entrar</h2>
        <div id="alert"></div>
        <form onsubmit="fazerLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit" class="btn-submit">Entrar</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            Não tem conta? <a href="cadastro.html" style="color: #3B82F6;">Cadastre-se</a>
        </p>
    </div>

    <script src="../js/app.js"></script>
    <script>
        function fazerLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const usuarios = [
                { email: "cliente@teste.com", senha: "123456", tipo: "cliente", nome: "Cliente Teste" },
                { email: "tecnico@teste.com", senha: "123456", tipo: "tecnico", nome: "Técnico Teste" }
            ];
            
            const usuariosStorage = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const todosUsuarios = [...usuarios, ...usuariosStorage];
            
            const usuario = todosUsuarios.find(u => u.email === email && u.senha === senha);
            
            if (usuario) {
                localStorage.setItem('usuario', JSON.stringify(usuario));
                window.location.href = `dashboard-${usuario.tipo}.html`;
            } else {
                document.getElementById('alert').innerHTML = 
                    '<div class="alert alert-error">Email ou senha incorretos</div>';
            }
        }
    </script>
</body>
</html>
