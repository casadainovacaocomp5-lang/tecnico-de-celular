<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnicos - CelularTech</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .filters-section {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .technicians-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .filters-grid {
                grid-template-columns: 1fr;
            }

            .technicians-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="../index.html" class="logo">🔧 CelularTech</a>
            <div class="nav-links"></div>
        </nav>
    </header>

    <main style="padding: 2rem 0; min-height: calc(100vh - 80px);">
        <div class="container">
            <h1 style="margin-bottom: 2rem;">Encontre Técnicos Especializados</h1>

            <!-- Filtros -->
            <div class="filters-section">
                <h2 style="margin-bottom: 1rem;">Filtrar por:</h2>
                <div class="filters-grid">
                    <div class="form-group">
                        <label for="filterCity">Cidade</label>
                        <select id="filterCity" class="form-input">
                            <option value="">Todas as cidades</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="filterService">Serviço</label>
                        <select id="filterService" class="form-input">
                            <option value="">Todos os serviços</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="filterRating">Avaliação Mínima</label>
                        <select id="filterRating" class="form-input">
                            <option value="">Qualquer avaliação</option>
                            <option value="3">3 ⭐ ou mais</option>
                            <option value="4">4 ⭐ ou mais</option>
                            <option value="4.5">4.5 ⭐ ou mais</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="filterPrice">Preço Máximo</label>
                        <input type="number" id="filterPrice" class="form-input" placeholder="R$ 500">
                    </div>

                    <div style="display: flex; align-items: flex-end; gap: 0.5rem;">
                        <button id="applyFilters" class="btn-primary" style="flex: 1;">🔍 Filtrar</button>
                        <button id="clearFilters" class="btn-secondary">Limpar</button>
                    </div>
                </div>
            </div>

            <!-- Técnicos -->
            <div id="techniciansContainer" class="technicians-grid"></div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/data-manager.js"></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/app.js"></script>

    <script>
        // Inicializar página
        function initPage() {
            loadCities();
            loadServices();
            applyFilters();
            updateHeader();
        }

        // Carregar cidades no select
        function loadCities() {
            const select = document.getElementById('filterCity');
            const cities = dataManager.getUniqueCities();
            
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                select.appendChild(option);
            });

            // Verificar se veio de search
            const cityParam = Router.getQueryParam('cidade');
            if (cityParam) {
                select.value = cityParam;
            }
        }

        // Carregar serviços no select
        function loadServices() {
            const select = document.getElementById('filterService');
            const allServices = new Set();
            
            dataManager.technicians.forEach(tech => {
                tech.specialties.forEach(spec => allServices.add(spec));
            });

            allServices.forEach(service => {
                const option = document.createElement('option');
                option.value = service;
                option.textContent = service;
                select.appendChild(option);
            });

            // Verificar se veio de search
            const serviceParam = Router.getQueryParam('servico');
            if (serviceParam) {
                select.value = serviceParam;
            }
        }

        // Aplicar filtros
        function applyFilters() {
            const filters = {
                city: document.getElementById('filterCity').value,
                service: document.getElementById('filterService').value,
                minRating: parseFloat(document.getElementById('filterRating').value) || 0,
                maxPrice: parseFloat(document.getElementById('filterPrice').value) || Infinity
            };

            const results = dataManager.searchTechnicians(filters);
            loadTechnicians('#techniciansContainer', results);
        }

        // Limpar filtros
        function clearFilters() {
            document.getElementById('filterCity').value = '';
            document.getElementById('filterService').value = '';
            document.getElementById('filterRating').value = '';
            document.getElementById('filterPrice').value = '';
            applyFilters();
        }

        // Event listeners
        document.getElementById('applyFilters').addEventListener('click', applyFilters);
        document.getElementById('clearFilters').addEventListener('click', clearFilters);

        // Inicializar
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
