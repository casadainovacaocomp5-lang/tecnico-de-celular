<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - CelularTech</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .servicos-container {
            padding: 2rem 0;
        }

        .servicos-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .servico-btn {
            padding: 1.5rem;
            border: 2px solid #E5E7EB;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .servico-btn:hover {
            border-color: #3B82F6;
            background: #F0F9FF;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        @media (max-width: 768px) {
            .servicos-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <section class="cta">
        <nav class="container">
            <h1 class="logo" style="text-align: center; font-size: 2.5rem;">CelularTech</h1>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="servicos.html">Serviços</a>
                <a href="pages/login.html">Entrar</a>
                <a href="pages/cadastro.html" class="btn-primary">Cadastrar</a>
            </div>
        </nav>
    </section>

    <div class="container servicos-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">Escolha um Serviço</h1>
        
        <div class="servicos-buttons">
            <a href="servico-detalhes.html?servico=Troca de Tela" class="servico-btn">Troca de Tela</a>
            <a href="servico-detalhes.html?servico=Troca de Bateria" class="servico-btn">Troca de Bateria</a>
            <a href="servico-detalhes.html?servico=Conector de Carga" class="servico-btn">Conector de Carga</a>
            <a href="servico-detalhes.html?servico=Reparo de Placa" class="servico-btn">Reparo de Placa</a>
            <a href="servico-detalhes.html?servico=Câmera" class="servico-btn">Câmera</a>
            <a href="servico-detalhes.html?servico=Alto-falante" class="servico-btn">Alto-falante</a>
            <a href="servico-detalhes.html?servico=Software" class="servico-btn">Software</a>
            <a href="servico-detalhes.html?servico=Placa Mãe" class="servico-btn">Placa Mãe</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
